<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Referral Program - Stripe Auto Hitter</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .ref-container { padding: 20px; max-width: 500px; margin: 0 auto; color: white; }
        .reward-card { background: linear-gradient(135deg, #10b981 0%, #059669 100%); padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 25px; }
        .reward-card i { font-size: 40px; margin-bottom: 15px; }
        .reward-card h2 { font-size: 24px; margin-bottom: 8px; }
        .reward-card p { font-size: 14px; opacity: 0.9; }

        .progress-section { background: #1a1c23; border: 1px solid #2d2f39; border-radius: 15px; padding: 25px; margin-bottom: 25px; }
        .progress-count { font-size: 36px; font-weight: 800; text-align: center; margin-bottom: 10px; color: #3b82f6; }
        .progress-label { text-align: center; color: #888; font-size: 14px; margin-bottom: 20px; }
        .progress-bar-large { background: #0f111a; height: 15px; border-radius: 10px; overflow: hidden; }
        .bar-inner { background: #3b82f6; height: 100%; width: 0%; transition: width 1s ease-out; }

        .link-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; box-shadow: var(--shadow); }
        .link-box { background: var(--bg-tab); border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-size: 12px; font-family: monospace; word-break: break-all; margin: 15px 0; color: var(--accent); }
        .share-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        
        body.light-mode .ref-container { color: var(--text-main); }
        body.light-mode .progress-section { background: var(--bg-card); border-color: var(--border); }
        body.light-mode .progress-count { color: var(--accent); }
        body.light-mode .bar-inner { background: var(--accent); }
    </style>
    <script>
        // Synchronous Auth & Theme Guard (Prevents Flickering)
        (function() {
            const savedTheme = localStorage.getItem('appTheme') || 'dark';
            if (savedTheme === 'light') document.body.classList.add('light-mode');
            
            if (!localStorage.getItem('userChatId')) {
                window.location.href = '/';
            }

            window.addEventListener('DOMContentLoaded', () => {
                // Set initial icon
                const themeBtn = document.getElementById('themeToggleBtn');
                if (themeBtn) {
                    const isLight = document.body.classList.contains('light-mode');
                    themeBtn.innerHTML = isLight ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
                }
            });
        })();

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeToggleBtn');
            const isLight = body.classList.toggle('light-mode');
            const newTheme = isLight ? 'light' : 'dark';
            
            localStorage.setItem('appTheme', newTheme);
            btn.innerHTML = isLight ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
        }
    </script>
</head>
<body>
    <div class="app-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div class="back-nav" style="margin-bottom: 0;" onclick="window.location.href='/'">
                <i class="fas fa-arrow-left"></i>
                <span>Referral Program</span>
            </div>
            <div id="themeToggleBtn" class="theme-toggle" onclick="toggleTheme()">
                <i class="fas fa-sun"></i>
            </div>
        </div>

        <div class="ref-container">
            <div class="reward-card">
                <i class="fas fa-gift"></i>
                <h2>Win Silver Plan</h2>
                <p>Refer 10 friends and get a premium Silver Plan for 7 days absolutely FREE!</p>
            </div>

            <div class="progress-section">
                <div class="progress-count" id="countDisplay">0 / 10</div>
                <div class="progress-label">Successful Referrals</div>
                <div class="progress-bar-large">
                    <div class="bar-inner" id="barDisplay"></div>
                </div>
            </div>

            <div class="link-section">
                <div style="font-weight: 600; font-size: 15px;">Your Referral Link</div>
                <div class="link-box" id="refLink">Loading...</div>
                <button class="share-btn" onclick="copyRefLink()"><i class="fas fa-copy"></i> Copy referral link</button>
            </div>

            <div style="margin-top: 30px; font-size: 13px; color: #666; text-align: center;">
                <p>New users must open the bot and launch the app via your link to count.</p>
            </div>
        </div>
    </div>

    <script>
        const chatId = localStorage.getItem('userChatId');
        if (!chatId) window.location.href = '/';

        const linkBase = "https://t.me/autohittrobot/hsijcs?startapp=";
        const fullLink = linkBase + chatId;
        document.getElementById('refLink').innerText = fullLink;

        async function loadReferrals() {
            try {
                const res = await fetch('/get-user-info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatId })
                });
                const data = await res.json();
                
                // Redirect if not verified
                if (data.isVerified === false) {
                    window.location.href = '/';
                    return;
                }

                const count = data.referralCount || 0;
                document.getElementById('countDisplay').innerText = `${count} / 10`;
                document.getElementById('barDisplay').style.width = `${Math.min(count, 10) * 10}%`;
            } catch (e) {
                console.error('Failed to load user info', e);
            }
        }

        function copyRefLink() {
            navigator.clipboard.writeText(fullLink);
            alert('Referral link copied to clipboard!');
        }

        loadReferrals();
    </script>
</body>
</html>
